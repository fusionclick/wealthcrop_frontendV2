# Container ke andar wala nginx. TLS yahan NAHI hai — wo host nginx ka kaam hai.
server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — /login jaise routes par bhi index.html do (yehi kaam _redirects karta tha)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # hashed assets kabhi badalte nahi, unhe lamba cache karne do
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
