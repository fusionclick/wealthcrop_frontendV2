services:
  web:
    image: ghcr.io/fusionclick/wealthcrop_frontendv2:latest   # GHCR naam lowercase hi hota hai
    restart: always
    ports:
      - "127.0.0.1:8080:8080"    # sirf localhost — bahar se seedha nahi khulta, host nginx proxy karta hai

# Auto-update watchtower se nahi, host ke systemd timer se hota hai:
#   sudo bash deploy/install-autoupdate.sh
# (watchtower Docker 29 ke saath API version ki wajah se chalta hi nahi)
